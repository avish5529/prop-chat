<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PropBot - NBA & MLB Props Analyzer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'DM Sans', system-ui, sans-serif; }
    .animate-bounce-delay-1 { animation-delay: 0.1s; }
    .animate-bounce-delay-2 { animation-delay: 0.2s; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const API_BASE = 'http://localhost:8000';

    // Utility functions
    const getVarianceInfo = (rating) => {
      const map = {
        'Very Low': { color: '#10b981', description: 'Very consistent scorer' },
        'Low': { color: '#10b981', description: 'Consistent scorer' },
        'Medium': { color: '#f59e0b', description: 'Moderate variance' },
        'High': { color: '#ef4444', description: 'Volatile scorer' },
        'Very High': { color: '#ef4444', description: 'Very volatile' }
      };
      return map[rating] || { color: '#f59e0b', description: 'Unknown' };
    };

    const getConfidenceInfo = (grade) => {
      const map = {
        'A': { color: '#10b981', label: 'Strong Play' },
        'B': { color: '#22c55e', label: 'Solid Play' },
        'C': { color: '#f59e0b', label: 'Marginal' },
        'D': { color: '#ef4444', label: 'Avoid' }
      };
      return map[grade] || { color: '#f59e0b', label: 'Unknown' };
    };

    // Game Chart Component - Last 10 Games visualization
    const GameChart = ({ games, line, recommendation }) => {
      if (!games || games.length === 0) return null;

      // Reverse games so latest is on the right
      const reversedGames = [...games].reverse();

      // Calculate max value for scaling (ensure line is visible)
      const maxVal = Math.max(...reversedGames.map(g => g.value), line * 1.1);
      const chartHeight = 120;

      // Calculate line position as percentage from bottom
      const linePosition = (line / maxVal) * 100;

      return (
        <div className="bg-gray-800/30 rounded-xl p-4 border border-gray-700/50">
          <h4 className="text-white font-semibold mb-3 flex items-center gap-2">
            <span className="w-2 h-2 bg-purple-400 rounded-full"></span>
            Last 10 Games
          </h4>

          {/* Chart container */}
          <div className="relative" style={{ height: `${chartHeight}px` }}>
            {/* Bars */}
            <div className="absolute bottom-0 left-0 right-0 top-0 flex gap-2 items-end px-1">
              {reversedGames.map((game, i) => {
                const isOver = game.value > line;
                const barHeight = (game.value / maxVal) * 100;
                return (
                  <div key={i} className="flex-1 flex flex-col items-center justify-end h-full">
                    <div
                      className={`w-full rounded-t transition-all relative ${isOver ? 'bg-emerald-500' : 'bg-red-500'}`}
                      style={{ height: `${barHeight}%`, minHeight: '20px' }}
                      title={`${game.date} vs ${game.opponent}: ${game.value}`}
                    >
                      {/* Value label inside bar */}
                      <span className="absolute inset-0 flex items-center justify-center text-white font-bold text-sm">
                        {game.value}
                      </span>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Horizontal line at the line value */}
            <div
              className="absolute left-0 right-0 flex items-center z-10 pointer-events-none"
              style={{ bottom: `${linePosition}%` }}
            >
              <div className="h-0.5 flex-1 bg-yellow-500"></div>
              <span className="text-yellow-400 text-xs font-bold bg-gray-800/90 px-2 py-0.5 rounded">
                Line: {line}
              </span>
              <div className="h-0.5 flex-1 bg-yellow-500"></div>
            </div>
          </div>

          {/* Dates below */}
          <div className="flex gap-2 mt-2 px-1">
            {reversedGames.map((game, i) => (
              <div key={i} className="flex-1 text-center">
                <span className="text-[10px] text-gray-500">{game.date}</span>
              </div>
            ))}
          </div>

          {/* Legend */}
          <div className="flex justify-center gap-6 mt-3 text-xs">
            <span className="flex items-center gap-1">
              <span className="w-3 h-3 bg-emerald-500 rounded"></span>
              <span className="text-gray-400">Over {line}</span>
            </span>
            <span className="flex items-center gap-1">
              <span className="w-3 h-3 bg-red-500 rounded"></span>
              <span className="text-gray-400">Under {line}</span>
            </span>
            <span className="text-gray-500">← Older | Newer →</span>
          </div>
        </div>
      );
    };

    // Betting Metrics Component
    const BettingMetrics = ({ analysis, recommendation }) => {
      const kelly = recommendation === 'over' ? analysis.kelly_over : analysis.kelly_under;
      const halfKelly = recommendation === 'over' ? analysis.half_kelly_over : analysis.half_kelly_under;
      const noVigProb = recommendation === 'over' ? analysis.no_vig_prob_over : analysis.no_vig_prob_under;
      const varianceInfo = getVarianceInfo(analysis.variance_rating);

      return (
        <div className="bg-gray-800/30 rounded-xl p-4 border border-gray-700/50">
          <h4 className="text-white font-semibold mb-3 flex items-center gap-2">
            <span className="w-2 h-2 bg-amber-400 rounded-full"></span>
            Betting Metrics
          </h4>
          <div className="space-y-3 text-sm">
            <div className="flex justify-between items-center">
              <div>
                <span className="text-gray-400">Kelly Criterion</span>
                <p className="text-xs text-gray-500">Optimal bet size (full Kelly)</p>
              </div>
              <span className={`font-bold ${kelly > 0 ? 'text-emerald-400' : 'text-gray-400'}`}>
                {kelly > 0 ? `${kelly.toFixed(1)}%` : 'No bet'}
              </span>
            </div>
            <div className="flex justify-between items-center">
              <div>
                <span className="text-gray-400">Half Kelly (Recommended)</span>
                <p className="text-xs text-gray-500">Conservative sizing</p>
              </div>
              <span className={`font-bold ${halfKelly > 0 ? 'text-blue-400' : 'text-gray-400'}`}>
                {halfKelly > 0 ? `${halfKelly.toFixed(1)}%` : 'No bet'}
              </span>
            </div>
            <div className="flex justify-between items-center">
              <div>
                <span className="text-gray-400">No-Vig Market Prob</span>
                <p className="text-xs text-gray-500">True market probability</p>
              </div>
              <span className="font-bold text-white">
                {(noVigProb * 100).toFixed(1)}%
              </span>
            </div>
            <div className="flex justify-between items-center">
              <div>
                <span className="text-gray-400">Variance</span>
                <p className="text-xs text-gray-500">{varianceInfo.description}</p>
              </div>
              <span className="font-bold" style={{ color: varianceInfo.color }}>
                {analysis.variance_rating}
              </span>
            </div>
          </div>
        </div>
      );
    };

    // Projection Adjustments Component
    const ProjectionAdjustments = ({ factors, opponent }) => {
      if (!factors) return null;

      const formatAdj = (val) => {
        if (val === undefined || val === null) return 'N/A';
        const num = parseFloat(val);
        if (isNaN(num)) return val;
        return num >= 0 ? `+${num.toFixed(1)}%` : `${num.toFixed(1)}%`;
      };

      return (
        <div className="bg-gray-800/30 rounded-xl p-4 border border-gray-700/50">
          <h4 className="text-white font-semibold mb-3 flex items-center gap-2">
            <span className="w-2 h-2 bg-cyan-400 rounded-full"></span>
            Projection Adjustments
          </h4>
          <div className="space-y-2 text-sm">
            <div className="flex justify-between">
              <span className="text-gray-400">Home Court</span>
              <span className={`font-semibold ${factors.venue_adj >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                {formatAdj(factors.venue_adj)}
              </span>
            </div>
            <div className="flex justify-between">
              <span className="text-gray-400">Pace Factor</span>
              <span className={`font-semibold ${factors.pace_adj >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                {formatAdj(factors.pace_adj)}
              </span>
            </div>
            <div className="flex justify-between">
              <span className="text-gray-400">Defense Adj</span>
              <span className={`font-semibold ${factors.defense_adj >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                {formatAdj(factors.defense_adj)}
              </span>
            </div>
            <div className="flex justify-between">
              <span className="text-gray-400">Form Trend</span>
              <span className={`font-semibold ${
                factors.form_trend === 'hot' ? 'text-emerald-400' :
                factors.form_trend === 'cold' ? 'text-red-400' : 'text-gray-300'
              }`}>
                {factors.form_trend ? factors.form_trend.charAt(0).toUpperCase() + factors.form_trend.slice(1) : 'Stable'}
              </span>
            </div>
          </div>
        </div>
      );
    };

    // Confidence Rating Component
    const ConfidenceRating = ({ grade, label }) => {
      const info = getConfidenceInfo(grade);

      return (
        <div className={`rounded-xl p-4 border ${
          grade === 'A' ? 'bg-emerald-500/10 border-emerald-500/30' :
          grade === 'B' ? 'bg-green-500/10 border-green-500/30' :
          grade === 'C' ? 'bg-yellow-500/10 border-yellow-500/30' :
          'bg-red-500/10 border-red-500/30'
        }`}>
          <h4 className="text-white font-semibold mb-2">Confidence Rating</h4>
          <div className="flex items-center justify-between">
            <span className="text-gray-400 text-sm">{info.label}</span>
            <span className="text-5xl font-black" style={{ color: info.color }}>
              {grade}
            </span>
          </div>
        </div>
      );
    };

    // Odds Table Component
    const OddsTable = ({ lines, line, bestOver, bestUnder, propLabel }) => {
      if (!lines || lines.length === 0) return null;

      return (
        <div className="bg-gray-800/30 rounded-xl p-4 border border-gray-700/50 overflow-x-auto">
          <h4 className="text-white font-semibold mb-3 flex items-center gap-2">
            <span className="w-2 h-2 bg-cyan-400 rounded-full"></span>
            Line Shopping - {propLabel} {line}
          </h4>
          <table className="w-full text-sm">
            <thead>
              <tr className="text-gray-400 border-b border-gray-700">
                <th className="text-left py-2">Book</th>
                <th className="text-center py-2">Line</th>
                <th className="text-center py-2">Over</th>
                <th className="text-center py-2">Under</th>
              </tr>
            </thead>
            <tbody>
              {lines.map((book, i) => (
                <tr key={i} className="border-b border-gray-800">
                  <td className="py-2 text-white">{book.book}</td>
                  <td className="text-center py-2 text-gray-300">{book.line}</td>
                  <td className={`text-center py-2 font-mono ${book.book === bestOver?.book && book.line === bestOver?.line ? 'text-emerald-400 font-bold' : 'text-gray-300'}`}>
                    {book.over_odds > 0 ? '+' : ''}{book.over_odds}
                    {book.book === bestOver?.book && book.line === bestOver?.line && <span className="ml-1 text-xs">★</span>}
                  </td>
                  <td className={`text-center py-2 font-mono ${book.book === bestUnder?.book && book.line === bestUnder?.line ? 'text-emerald-400 font-bold' : 'text-gray-300'}`}>
                    {book.under_odds > 0 ? '+' : ''}{book.under_odds}
                    {book.book === bestUnder?.book && book.line === bestUnder?.line && <span className="ml-1 text-xs">★</span>}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          <p className="text-gray-500 text-xs mt-2">★ = Best available odds</p>
        </div>
      );
    };

    // Main Analysis Card Component
    const AnalysisCard = ({ result }) => {
      const { player, team, position, prop_type, prop_label, game, opponent, lines, best_over, best_under, stats, analysis, manual_mode } = result;

      const line = best_over?.line || best_under?.line || 0;

      // CatBoost ML data (now primary)
      const catboost = analysis.catboost;
      const hasCatboost = catboost && catboost.prob_over !== undefined;

      // Use CatBoost as primary recommendation if available, otherwise fall back to rule-based
      const recommendation = hasCatboost ? catboost.recommended_side : analysis.recommended_side;
      const trueProbability = hasCatboost
        ? (recommendation === 'over' ? catboost.prob_over : catboost.prob_under)
        : (recommendation === 'over' ? analysis.prob_over : analysis.prob_under);
      const mlConfidence = hasCatboost ? catboost.confidence : null;

      // Rule-based values (now secondary)
      const ruleBasedRec = analysis.recommended_side;
      const ruleBasedProb = ruleBasedRec === 'over' ? analysis.prob_over : analysis.prob_under;
      const edge = analysis.edge;
      const ev = ruleBasedRec === 'over' ? analysis.ev_over : analysis.ev_under;
      const hitRate = recommendation === 'over' ? analysis.hit_rate_over : analysis.hit_rate_under;

      const isPositiveEV = (ruleBasedRec === 'over' ? analysis.ev_over : analysis.ev_under) > 0;
      const confidenceInfo = getConfidenceInfo(analysis.confidence_grade);

      // Format game string
      const gameStr = game ? `${game.away_team} @ ${game.home_team}` : '';
      const opponentName = opponent?.team_name || '';

      return (
        <div className="space-y-4">
          {/* Header */}
          <div className="bg-gradient-to-r from-gray-800 to-gray-800/50 rounded-xl p-4 border border-gray-700/50">
            <div className="flex justify-between items-start">
              <div>
                <h3 className="text-xl font-bold text-white">{player}</h3>
                <p className="text-gray-400 text-sm">{team} • {position}</p>
                <p className="text-cyan-400 text-sm mt-1">{gameStr}</p>
              </div>
              <div className="text-right">
                <span className={`inline-block px-3 py-1 rounded-full text-sm font-semibold ${
                  isPositiveEV ? 'bg-emerald-500/20 text-emerald-400' : 'bg-yellow-500/20 text-yellow-400'
                }`}>
                  {isPositiveEV ? '+EV' : 'Neutral'}
                </span>
                {manual_mode && (
                  <span className="block mt-1 text-xs text-yellow-400">Manual Mode</span>
                )}
              </div>
            </div>
          </div>

          {/* Recommendation Box - Now shows CatBoost ML as primary */}
          <div className={`rounded-xl p-4 border ${
            recommendation === 'over' ? 'bg-emerald-900/20 border-emerald-500/30' : 'bg-rose-900/20 border-rose-500/30'
          }`}>
            <div className="flex justify-between items-center mb-3">
              <div>
                <div className="flex items-center gap-2 mb-1">
                  <span className="text-purple-400 text-xs font-semibold bg-purple-500/20 px-2 py-0.5 rounded">🤖 ML MODEL</span>
                  <span className="text-gray-500 text-xs">(56% accuracy)</span>
                </div>
                <span className={`text-2xl font-bold ${recommendation === 'over' ? 'text-emerald-400' : 'text-rose-400'}`}>
                  {recommendation.toUpperCase()} {line}
                </span>
                <span className="text-gray-400 ml-2">{prop_label}</span>
              </div>
              <div className="text-right">
                <span className="text-gray-400 text-sm">ML Confidence</span>
                <span className="block text-xl font-bold text-purple-400">
                  {mlConfidence ? `${(mlConfidence * 100).toFixed(1)}%` : 'N/A'}
                </span>
              </div>
            </div>

            {/* Key Metrics Row */}
            <div className="grid grid-cols-4 gap-3 text-center">
              <div>
                <span className="text-gray-500 text-xs block">ML Prob</span>
                <span className="text-white font-semibold">{(trueProbability * 100).toFixed(1)}%</span>
              </div>
              <div>
                <span className="text-gray-500 text-xs block">Projection</span>
                <span className="text-white font-semibold">
                  {analysis.adjusted_projection?.toFixed(1) || analysis.model_projection?.toFixed(1)}
                </span>
              </div>
              <div>
                <span className="text-gray-500 text-xs block">EV</span>
                <span className={`font-semibold ${ev > 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                  {ev > 0 ? '+' : ''}{ev.toFixed(1)}%
                </span>
              </div>
              <div>
                <span className="text-gray-500 text-xs block">Hit Rate</span>
                <span className={`font-semibold ${hitRate >= 0.6 ? 'text-emerald-400' : hitRate >= 0.4 ? 'text-yellow-400' : 'text-red-400'}`}>
                  {(hitRate * 100).toFixed(0)}%
                </span>
              </div>
            </div>
          </div>

          {/* Stats Row */}
          <div className="grid grid-cols-2 gap-3">
            <div className="bg-gray-800/30 rounded-xl p-4 border border-gray-700/50">
              <h4 className="text-gray-400 text-xs uppercase tracking-wide mb-2">Player Stats</h4>
              <div className="space-y-2 text-sm">
                <div className="flex justify-between">
                  <span className="text-gray-400">Season Avg</span>
                  <span className="text-white font-semibold">{stats.season_avg}</span>
                </div>
                <div className="flex justify-between">
                  <span className="text-gray-400">Last 10 Avg</span>
                  <span className="text-white font-semibold">{stats.last_10_avg}</span>
                </div>
                <div className="flex justify-between">
                  <span className="text-gray-400">Minutes Avg</span>
                  <span className="text-white font-semibold">{stats.minutes_avg}</span>
                </div>
                <div className="flex justify-between">
                  <span className="text-gray-400">Usage Rate</span>
                  <span className="text-white font-semibold">{stats.usage_rate ? (stats.usage_rate * 100).toFixed(1) + '%' : 'N/A'}</span>
                </div>
              </div>
            </div>

            <div className="bg-gray-800/30 rounded-xl p-4 border border-gray-700/50">
              <h4 className="text-gray-400 text-xs uppercase tracking-wide mb-2">Matchup</h4>
              <div className="space-y-2 text-sm">
                <div className="flex justify-between">
                  <span className="text-gray-400">vs {opponentName}</span>
                  <span className="text-white font-semibold">{stats.vs_opponent_avg || 'N/A'}</span>
                </div>
                <div className="flex justify-between">
                  <span className="text-gray-400">Home / Away</span>
                  <span className="text-white font-semibold">{stats.home_avg} / {stats.away_avg}</span>
                </div>
                <div className="flex justify-between">
                  <span className="text-gray-400">Opp Def Rank</span>
                  <span className="text-white font-semibold">#{opponent?.def_rating_rank || 'N/A'}</span>
                </div>
                <div className="flex justify-between">
                  <span className="text-gray-400">Hit Rate @ {line}</span>
                  <span className={`font-semibold ${hitRate >= 0.6 ? 'text-emerald-400' : 'text-yellow-400'}`}>
                    {(hitRate * 100).toFixed(0)}% ({Math.round(hitRate * 10)}/10)
                  </span>
                </div>
              </div>
            </div>
          </div>

          {/* Last 10 Games Chart */}
          <GameChart
            games={stats.last_10_games}
            line={line}
            recommendation={recommendation}
          />

          {/* Three Column Row: Betting Metrics, Projection Adjustments, Confidence */}
          <div className="grid grid-cols-3 gap-3">
            <BettingMetrics analysis={analysis} recommendation={recommendation} />
            <ProjectionAdjustments factors={analysis.adjustment_factors} opponent={opponent} />
            <ConfidenceRating grade={analysis.confidence_grade} />
          </div>

          {/* Odds Table */}
          <OddsTable
            lines={lines}
            line={line}
            bestOver={best_over}
            bestUnder={best_under}
            propLabel={prop_label}
          />

          {/* Analysis Summary */}
          <div className="bg-gradient-to-r from-gray-800/50 to-gray-700/30 rounded-xl p-4 border border-gray-600/50">
            <h4 className="text-white font-semibold mb-2 flex items-center gap-2">
              <span className="w-2 h-2 bg-cyan-400 rounded-full"></span>
              Analysis Summary
            </h4>
            <p className="text-gray-300 text-sm leading-relaxed whitespace-pre-wrap">
              {analysis.summary}
            </p>
          </div>
        </div>
      );
    };

    // MLB Analysis Card Component
    const MLBAnalysisCard = ({ result }) => {
      const {
        pitcher, team, opponent, venue, park_k_factor,
        projected_ks, line, over_odds, under_odds, best_book,
        prob_over, prob_under, ev_over, ev_under,
        recommended_side, edge, ev, confidence, confidence_grade,
        pitcher_stats, matchup_factors, last_5_starts, breakdown, summary,
        model_type, lineup_confirmed, sim_stats, lineup
      } = result;

      const isOver = recommended_side === 'over';
      const probability = isOver ? prob_over : prob_under;
      const evValue = isOver ? ev_over : ev_under;
      const confidenceInfo = getConfidenceInfo(confidence_grade);

      // Park factor display
      const parkEffect = park_k_factor ? ((park_k_factor - 1) * 100).toFixed(0) : 0;
      const parkLabel = parkEffect > 0 ? `+${parkEffect}% Ks` : parkEffect < 0 ? `${parkEffect}% Ks` : 'Neutral';

      // Model type display
      const isSimulation = model_type === 'simulation';
      const modelLabel = isSimulation ? 'Monte Carlo' : 'Beta-Binomial';
      const modelColor = isSimulation ? 'bg-purple-500/20 text-purple-400' : 'bg-yellow-500/20 text-yellow-400';

      return (
        <div className="space-y-4">
          {/* Header */}
          <div className="bg-gradient-to-r from-green-900/50 to-green-800/30 rounded-xl p-4 border border-green-700/50">
            <div className="flex justify-between items-start">
              <div>
                <div className="flex items-center gap-2 mb-1">
                  <span className="text-2xl">⚾</span>
                  <span className="text-xs bg-green-500/20 text-green-400 px-2 py-0.5 rounded font-semibold">MLB</span>
                  <span className={`text-xs ${modelColor} px-2 py-0.5 rounded font-semibold`}>{modelLabel}</span>
                </div>
                <h3 className="text-xl font-bold text-white">{pitcher}</h3>
                <p className="text-gray-400 text-sm">{team} • Strikeouts</p>
                <p className="text-cyan-400 text-sm mt-1">vs {opponent}</p>
              </div>
              <div className="text-right">
                <span className={`inline-block px-3 py-1 rounded-full text-sm font-semibold ${
                  evValue > 0 ? 'bg-emerald-500/20 text-emerald-400' : 'bg-yellow-500/20 text-yellow-400'
                }`}>
                  {evValue > 0 ? '+EV' : 'Neutral'}
                </span>
              </div>
            </div>
          </div>

          {/* Venue & Park Factor */}
          {venue && (
            <div className="bg-gray-800/30 rounded-xl p-3 border border-gray-700/50 flex justify-between items-center">
              <div className="flex items-center gap-2">
                <span className="text-gray-400 text-sm">📍 {venue}</span>
              </div>
              <div className={`px-2 py-1 rounded text-xs font-semibold ${
                parkEffect > 0 ? 'bg-emerald-500/20 text-emerald-400' :
                parkEffect < 0 ? 'bg-red-500/20 text-red-400' : 'bg-gray-500/20 text-gray-400'
              }`}>
                K Factor: {park_k_factor?.toFixed(2)} ({parkLabel})
              </div>
            </div>
          )}

          {/* Recommendation Box */}
          <div className={`rounded-xl p-4 border ${
            isOver ? 'bg-emerald-900/20 border-emerald-500/30' : 'bg-rose-900/20 border-rose-500/30'
          }`}>
            <div className="flex justify-between items-center mb-3">
              <div>
                <span className={`text-2xl font-bold ${isOver ? 'text-emerald-400' : 'text-rose-400'}`}>
                  {recommended_side.toUpperCase()} {line}
                </span>
                <span className="text-gray-400 ml-2">Strikeouts</span>
              </div>
              <div className="text-right">
                <span className="text-gray-400 text-sm">Probability</span>
                <span className="block text-xl font-bold text-white">
                  {(probability * 100).toFixed(1)}%
                </span>
              </div>
            </div>

            {/* Key Metrics Row */}
            <div className="grid grid-cols-4 gap-3 text-center">
              <div>
                <span className="text-gray-500 text-xs block">Projected</span>
                <span className="text-white font-semibold">{projected_ks} Ks</span>
              </div>
              <div>
                <span className="text-gray-500 text-xs block">Edge</span>
                <span className={`font-semibold ${edge > 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                  {edge > 0 ? '+' : ''}{(edge * 100).toFixed(1)}%
                </span>
              </div>
              <div>
                <span className="text-gray-500 text-xs block">EV</span>
                <span className={`font-semibold ${evValue > 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                  {evValue > 0 ? '+' : ''}{(evValue * 100).toFixed(1)}%
                </span>
              </div>
              <div>
                <span className="text-gray-500 text-xs block">Grade</span>
                <span className="font-semibold" style={{ color: confidenceInfo.color }}>
                  {confidence_grade}
                </span>
              </div>
            </div>
          </div>

          {/* Stats Row */}
          <div className="grid grid-cols-2 gap-3">
            <div className="bg-gray-800/30 rounded-xl p-4 border border-gray-700/50">
              <h4 className="text-gray-400 text-xs uppercase tracking-wide mb-2">Pitcher Stats</h4>
              <div className="space-y-2 text-sm">
                <div className="flex justify-between">
                  <span className="text-gray-400">K%</span>
                  <span className="text-white font-semibold">{pitcher_stats?.k_pct?.toFixed(1) || 'N/A'}%</span>
                </div>
                <div className="flex justify-between">
                  <span className="text-gray-400">SwStr%</span>
                  <span className="text-white font-semibold">{pitcher_stats?.swstr_pct?.toFixed(1) || 'N/A'}%</span>
                </div>
                <div className="flex justify-between">
                  <span className="text-gray-400">Season K Avg</span>
                  <span className="text-white font-semibold">{pitcher_stats?.season_k_avg?.toFixed(1) || 'N/A'}</span>
                </div>
                <div className="flex justify-between">
                  <span className="text-gray-400">IP</span>
                  <span className="text-white font-semibold">{pitcher_stats?.ip || 'N/A'}</span>
                </div>
              </div>
            </div>

            <div className="bg-gray-800/30 rounded-xl p-4 border border-gray-700/50">
              <h4 className="text-gray-400 text-xs uppercase tracking-wide mb-2">Matchup Factors</h4>
              <div className="space-y-2 text-sm">
                <div className="flex justify-between">
                  <span className="text-gray-400">Opp K% ({matchup_factors?.handedness})</span>
                  <span className="text-white font-semibold">{matchup_factors?.opp_k_pct_vs_hand?.toFixed(1) || 'N/A'}%</span>
                </div>
                <div className="flex justify-between">
                  <span className="text-gray-400">Park Adj</span>
                  <span className={`font-semibold ${matchup_factors?.park_adj >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                    {matchup_factors?.park_adj >= 0 ? '+' : ''}{(matchup_factors?.park_adj * 100)?.toFixed(1) || 0}%
                  </span>
                </div>
                <div className="flex justify-between">
                  <span className="text-gray-400">Total Adj</span>
                  <span className={`font-semibold ${matchup_factors?.total_adj >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                    {matchup_factors?.total_adj >= 0 ? '+' : ''}{(matchup_factors?.total_adj * 100)?.toFixed(1) || 0}%
                  </span>
                </div>
              </div>
            </div>
          </div>

          {/* Simulation Details (Monte Carlo only) */}
          {isSimulation && sim_stats && (
            <div className="bg-purple-900/20 rounded-xl p-4 border border-purple-500/30">
              <h4 className="text-purple-400 font-semibold mb-3 flex items-center gap-2">
                <span className="text-lg">🎲</span>
                Monte Carlo Simulation (3,000 sims)
              </h4>
              <div className="grid grid-cols-4 gap-3 text-center text-sm mb-3">
                <div>
                  <span className="text-gray-400 text-xs block">Mean Ks</span>
                  <span className="text-white font-bold">{sim_stats.mean_k}</span>
                </div>
                <div>
                  <span className="text-gray-400 text-xs block">Std Dev</span>
                  <span className="text-white font-semibold">±{sim_stats.std_k}</span>
                </div>
                <div>
                  <span className="text-gray-400 text-xs block">Avg IP</span>
                  <span className="text-white font-semibold">{sim_stats.avg_ip}</span>
                </div>
                <div>
                  <span className="text-gray-400 text-xs block">Avg Pitches</span>
                  <span className="text-white font-semibold">{sim_stats.avg_pitches}</span>
                </div>
              </div>
              {lineup && lineup.length > 0 && (
                <div className="border-t border-purple-500/20 pt-3">
                  <span className="text-gray-400 text-xs">Lineup K rates: </span>
                  <span className="text-purple-300 text-xs">
                    {lineup.slice(0, 5).map(b => `${b.name.split(' ').pop()} ${b.k_pct}%`).join(' • ')}
                    {lineup.length > 5 && ' ...'}
                  </span>
                </div>
              )}
            </div>
          )}

          {/* Beta-Binomial Notice */}
          {!isSimulation && (
            <div className="bg-yellow-900/20 rounded-xl p-3 border border-yellow-500/30">
              <div className="flex items-center gap-2 text-yellow-400 text-sm">
                <span>⚠️</span>
                <span>Using Beta-Binomial model (lineup not yet confirmed). Simulation will be used once lineups are posted.</span>
              </div>
            </div>
          )}

          {/* Last 5 Starts */}
          {last_5_starts && last_5_starts.length > 0 && (
            <div className="bg-gray-800/30 rounded-xl p-4 border border-gray-700/50">
              <h4 className="text-white font-semibold mb-3 flex items-center gap-2">
                <span className="w-2 h-2 bg-green-400 rounded-full"></span>
                Last 5 Starts
              </h4>
              <div className="flex gap-2">
                {last_5_starts.map((start, i) => {
                  const isOverLine = start.ks > line;
                  return (
                    <div key={i} className={`flex-1 text-center p-2 rounded ${
                      isOverLine ? 'bg-emerald-500/20' : 'bg-red-500/20'
                    }`}>
                      <div className="text-white font-bold">{start.ks}</div>
                      <div className="text-gray-400 text-xs">{start.ip} IP</div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Odds */}
          <div className="bg-gray-800/30 rounded-xl p-4 border border-gray-700/50">
            <h4 className="text-gray-400 text-xs uppercase tracking-wide mb-2">Best Odds</h4>
            <div className="flex justify-between items-center">
              <div>
                <span className="text-gray-400 text-sm">Over {line}: </span>
                <span className="text-white font-semibold">{over_odds > 0 ? '+' : ''}{over_odds}</span>
              </div>
              <div>
                <span className="text-gray-400 text-sm">Under {line}: </span>
                <span className="text-white font-semibold">{under_odds > 0 ? '+' : ''}{under_odds}</span>
              </div>
              {best_book && (
                <div className="text-cyan-400 text-sm">@ {best_book}</div>
              )}
            </div>
          </div>

          {/* Analysis Summary */}
          {summary && (
            <div className="bg-gradient-to-r from-green-800/30 to-green-700/20 rounded-xl p-4 border border-green-600/30">
              <h4 className="text-white font-semibold mb-2 flex items-center gap-2">
                <span className="w-2 h-2 bg-green-400 rounded-full"></span>
                Analysis Summary
              </h4>
              <p className="text-gray-300 text-sm leading-relaxed whitespace-pre-wrap">
                {summary}
              </p>
            </div>
          )}
        </div>
      );
    };

    // Message Component
    const Message = ({ message, isUser }) => {
      return (
        <div className={`flex ${isUser ? 'justify-end' : 'justify-start'} mb-4`}>
          <div className={`max-w-[95%] ${isUser ? 'order-2' : 'order-1'}`}>
            {!isUser && (
              <div className="flex items-center gap-2 mb-1">
                <div className="w-6 h-6 rounded-full bg-gradient-to-br from-emerald-400 to-cyan-500 flex items-center justify-center">
                  <span className="text-xs">🏀</span>
                </div>
                <span className="text-gray-400 text-sm font-medium">PropBot</span>
              </div>
            )}
            <div className={`rounded-2xl px-4 py-3 ${
              isUser
                ? 'bg-gradient-to-r from-blue-600 to-blue-500 text-white'
                : 'bg-gray-800/80 border border-gray-700'
            }`}>
              {message.type === 'text' && (
                <p className={`${isUser ? 'text-white' : 'text-gray-200'} whitespace-pre-wrap`}>{message.content}</p>
              )}
              {message.type === 'analysis' && <AnalysisCard result={message.content} />}
              {message.type === 'mlb_analysis' && <MLBAnalysisCard result={message.content} />}
              {message.type === 'error' && (
                <p className="text-red-400 whitespace-pre-wrap">{message.content}</p>
              )}
            </div>
          </div>
        </div>
      );
    };

    // Main App Component
    function PropsAnalyzer() {
      const [messages, setMessages] = useState([
        {
          isUser: false,
          message: {
            type: 'text',
            content: `Welcome to PropBot! 🏀⚾

I analyze NBA player props and MLB pitcher strikeouts using LIVE data:
• Real-time odds from multiple sportsbooks
• Actual player/pitcher stats from NBA/MLB APIs
• Advanced projections with matchup adjustments
• 🤖 CatBoost ML model (NBA) + Park factors (MLB)

🏀 NBA Examples:
"LeBron James points"
"Luka Doncic pra"

⚾ MLB Examples (prefix with "mlb"):
"mlb Zach Eflin"
"mlb Corbin Burnes"

💡 MLB shows venue & park K-factor!`
          }
        }
      ]);
      const [input, setInput] = useState('');
      const [isLoading, setIsLoading] = useState(false);
      const [quickPickPlayers, setQuickPickPlayers] = useState([]);
      const [oddsApiAvailable, setOddsApiAvailable] = useState(true);
      const [mlModelLoaded, setMlModelLoaded] = useState(true);
      const messagesEndRef = useRef(null);

      const scrollToBottom = () => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      };

      useEffect(() => {
        scrollToBottom();
      }, [messages]);

      // Fetch health status
      useEffect(() => {
        const checkHealth = () => {
          fetch(`${API_BASE}/health`)
            .then(res => res.json())
            .then(data => {
              setOddsApiAvailable(data.odds_api_available !== false);
              setMlModelLoaded(data.ml_model_loaded !== false);
            })
            .catch(err => console.log('Health check failed:', err));
        };

        checkHealth();
        const interval = setInterval(checkHealth, 30000);
        return () => clearInterval(interval);
      }, []);

      // Fetch events for quick picks
      useEffect(() => {
        fetch(`${API_BASE}/events`)
          .then(res => res.json())
          .then(data => {
            if (data.events && data.events.length > 0) {
              const teams = data.events.slice(0, 3).map(e => e.home_team.split(' ').pop());
              const playerMap = {
                'Lakers': 'LeBron James points',
                'Warriors': 'Stephen Curry points',
                'Mavericks': 'Luka Doncic points',
                'Suns': 'Kevin Durant points',
                'Nuggets': 'Nikola Jokic points',
                'Bucks': 'Giannis Antetokounmpo points',
                'Celtics': 'Jayson Tatum points',
                '76ers': 'Tyrese Maxey points',
                'Heat': 'Jimmy Butler points',
                'Knicks': 'Jalen Brunson points'
              };
              setQuickPickPlayers(teams.map(t => playerMap[t] || `${t} player points`).filter(Boolean));
            }
          })
          .catch(err => console.log('Events fetch failed:', err));
      }, []);

      const processInput = async (text) => {
        if (!text.trim()) return;

        const userInput = text.trim();
        setMessages(prev => [...prev, { isUser: true, message: { type: 'text', content: userInput } }]);
        setIsLoading(true);
        setInput('');

        try {
          // Detect MLB queries: starts with "mlb " or "mlb:"
          const isMLB = userInput.toLowerCase().startsWith('mlb ') || userInput.toLowerCase().startsWith('mlb:');
          const query = isMLB ? userInput.slice(4).trim() : userInput;
          const endpoint = isMLB ? '/mlb/analyze' : '/analyze';

          const response = await fetch(`${API_BASE}${endpoint}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: query })
          });

          if (!response.ok) {
            const error = await response.json();
            throw new Error(error.detail || 'Analysis failed');
          }

          const result = await response.json();
          const messageType = result.sport === 'mlb' ? 'mlb_analysis' : 'analysis';
          setMessages(prev => [...prev, { isUser: false, message: { type: messageType, content: result } }]);
        } catch (err) {
          if (err.message.toLowerCase().includes('quota') || err.message.toLowerCase().includes('usage')) {
            setOddsApiAvailable(false);
          }

          setMessages(prev => [...prev, {
            isUser: false,
            message: {
              type: 'error',
              content: `Error: ${err.message}\n\n${
                err.message.toLowerCase().includes('quota')
                  ? '💡 Tip: Use manual mode by adding line + odds:\n"LeBron James points 25.5 -110"'
                  : `Make sure backend is running at ${API_BASE}`
              }`
            }
          }]);
        }

        setIsLoading(false);
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          processInput(input);
        }
      };

      const defaultQuickPicks = [
        "LeBron James points",
        "Luka Doncic rebounds",
        "Stephen Curry pra"
      ];

      const quickPicks = quickPickPlayers.length > 0 ? quickPickPlayers : defaultQuickPicks;

      return (
        <div className="min-h-screen bg-[#0a0f1a] flex flex-col">
          {/* Header */}
          <div className="bg-gradient-to-r from-gray-900 via-gray-800 to-gray-900 border-b border-gray-700/50 px-4 py-4">
            <div className="max-w-4xl mx-auto flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-400 to-cyan-500 flex items-center justify-center shadow-lg shadow-emerald-500/20">
                  <span className="text-xl">🏀</span>
                </div>
                <div>
                  <h1 className="text-white font-bold text-lg">PropBot</h1>
                  <p className="text-gray-400 text-xs">NBA & MLB Props Analyzer</p>
                </div>
              </div>
              <div className="flex items-center gap-4">
                <div className="flex items-center gap-2">
                  <span className={`w-2 h-2 rounded-full animate-pulse ${oddsApiAvailable ? 'bg-emerald-400' : 'bg-yellow-400'}`}></span>
                  <span className={`text-sm ${oddsApiAvailable ? 'text-emerald-400' : 'text-yellow-400'}`}>
                    {oddsApiAvailable ? 'Live Odds' : 'Manual Mode'}
                  </span>
                </div>
                <div className="flex items-center gap-2">
                  <span className={`w-2 h-2 rounded-full animate-pulse ${mlModelLoaded ? 'bg-purple-400' : 'bg-gray-500'}`}></span>
                  <span className={`text-sm ${mlModelLoaded ? 'text-purple-400' : 'text-gray-500'}`}>ML</span>
                </div>
              </div>
            </div>
          </div>

          {/* Messages */}
          <div className="flex-1 overflow-y-auto px-4 py-6">
            <div className="max-w-4xl mx-auto">
              {messages.map((msg, i) => (
                <Message key={i} message={msg.message} isUser={msg.isUser} />
              ))}
              {isLoading && (
                <div className="flex justify-start mb-4">
                  <div className="bg-gray-800/80 border border-gray-700 rounded-2xl px-4 py-3">
                    <div className="flex items-center gap-2">
                      <div className="w-2 h-2 rounded-full animate-bounce bg-emerald-400"></div>
                      <div className="w-2 h-2 rounded-full animate-bounce animate-bounce-delay-1 bg-emerald-400"></div>
                      <div className="w-2 h-2 rounded-full animate-bounce animate-bounce-delay-2 bg-emerald-400"></div>
                      <span className="text-gray-400 text-sm ml-2">Fetching live odds & analyzing...</span>
                    </div>
                  </div>
                </div>
              )}
              <div ref={messagesEndRef} />
            </div>
          </div>

          {/* Quick Picks */}
          {messages.length <= 2 && (
            <div className="px-4 pb-2">
              <div className="max-w-4xl mx-auto">
                <p className="text-gray-500 text-xs mb-2">Quick picks (today's games):</p>
                <div className="flex flex-wrap gap-2">
                  {quickPicks.map((pick, i) => (
                    <button
                      key={i}
                      onClick={() => processInput(pick)}
                      className="px-3 py-1.5 bg-gray-800/50 border border-gray-700 rounded-full text-sm text-gray-300 hover:bg-gray-700/50 hover:border-gray-600 transition-all"
                    >
                      {pick}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* Input */}
          <div className="bg-gradient-to-t from-gray-900 to-transparent pt-4 pb-6 px-4">
            <div className="max-w-4xl mx-auto">
              <div className="relative">
                <input
                  type="text"
                  value={input}
                  onChange={(e) => setInput(e.target.value)}
                  onKeyDown={handleKeyDown}
                  placeholder="Player + Prop: LeBron James points, rebounds, assists, pra"
                  disabled={isLoading}
                  className="w-full bg-gray-800/80 border border-gray-600 rounded-2xl px-5 py-4 pr-14 text-white placeholder-gray-500 focus:outline-none focus:border-emerald-500/50 focus:ring-2 focus:ring-emerald-500/20 transition-all disabled:opacity-50"
                />
                <button
                  type="button"
                  onClick={(e) => { e.preventDefault(); processInput(input); }}
                  disabled={isLoading}
                  className="absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 bg-gradient-to-r from-emerald-500 to-cyan-500 rounded-xl flex items-center justify-center hover:opacity-90 transition-opacity disabled:opacity-50"
                >
                  <svg className="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14 5l7 7m0 0l-7 7m7-7H3" />
                  </svg>
                </button>
              </div>
              <p className="text-gray-600 text-xs mt-2 text-center">
                NBA Props • Live Odds API • Backend: {API_BASE}
              </p>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PropsAnalyzer />);
  </script>
</body>
</html>
